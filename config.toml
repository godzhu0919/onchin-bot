# Solana 套利机器人配置文件

[grpc]
endpoint = "127.0.0.1:10000"
# token = "your_token_here"  # 可选

[rpc]
# 启动时用于 getMultipleAccounts 拉初始账户快照。
http_url = "http://127.0.0.1:8899"

[subscription]
# 监听通道容量。单条更新会携带账户数据，过大很容易直接把内存顶爆。
channel_capacity = 4096

# gRPC 断线/空闲后的重连退避。
reconnect_initial_ms = 500
reconnect_max_ms = 30000

# 超过该时间没有任何 Yellowstone 消息就主动重连。
stream_idle_timeout_secs = 60

[execution]
enabled = true
dry_run_only = false
max_slippage_bps = 100
send_transport = "jito"
jito_tip_lamports = 1000
jito_endpoints = ["https://amsterdam.mainnet.block-engine.jito.wtf"]
live_send_min_profit_pct = 0.0
require_pre_send_simulation = false
two_hop_profit_guard_min_usdc = 0.0
program_pair_min_profit_lamports = 0
direct_send_extra_edge_pct = 0.0
direct_send_extra_edge_usdc = 0.0
direct_send_min_gate_pct = 0.0
direct_send_max_state_age_ms = 0
send_on_positive_spot = true
skip_monitor_only_routes_when_live = true
execution_min_interval_ms = 0
compute_unit_limit = 250000
compute_unit_limit_margin_bps = 0
compute_unit_limit_min_buffer = 0
compute_unit_price_micro_lamports = 0
fast_path_direct_send = true
disable_direct_send_skip = true
disable_local_profit_checks = true
disable_fast_path_spot_profit_filter = true
enable_meteora_clmm_live_send = true
enable_meteora_meteora_live_send = false
address_lookup_tables = [
    "EbMDbHsAs9MLgZMN9qyxdHSzvFvM1eBadyNMbc5D1zGH",
    "2qHaPZVbnAMepsfrCzr3dPzq9KJ8t1AW7GV8YjMcQYwc",
    "BDdREJfyy1NNcgwe4AA7iZgfLFKW4XBz6Y2o6nw5uyst",
]
two_hop_executor_program_id = "3NerRj5cGM4n7Jx9bTzpF5nc4LHUZZo3NoqGN2eTqSBj"

[strategy]
# 最小利润阈值 (百分比) - 只在本地预估收益大于 0 时继续进入 exact/send 流程。
min_profit_threshold = 0.0

# SOL/USDC 价格 (如果没有预言机)
sol_usdc_price = 85.44

# 精确预检里使用的单腿 gas 估算（SOL）；两腿交易会乘 2。
preflight_gas_cost_sol = 0.00002

# PumpSwap->Raydium CLMM 精确预检时，对第一腿买到的 token 数量使用的保守缓冲。
pumpswap_buy_output_buffer_bps = 50.0

# Raydium CLMM 输出在精确预检时使用的保守缓冲。
raydium_clmm_output_buffer_bps = 50.0

# PumpSwap->Meteora 真实成交风控
pumpswap_meteora_small_pool_liquidity_usdc = 10000.0
pumpswap_meteora_max_trade_depth_bps = 1000000.0
pumpswap_meteora_buy_slippage_bps = 125.0
pumpswap_meteora_buy_slippage_bps_small_pool = 50.0
pumpswap_meteora_sell_slippage_bps = 90.0
pumpswap_meteora_sell_slippage_bps_small_pool = 40.0
pumpswap_meteora_max_touched_bin_arrays = 64
pumpswap_meteora_max_meteora_fee_bps = 180.0
pumpswap_meteora_failure_buffer_usdc = 0.03
pumpswap_meteora_wrap_unwrap_cost_sol = 0.0
pumpswap_meteora_ata_cost_sol = 0.0
pumpswap_fee_lp_share_bps = 8000
pumpswap_fee_protocol_share_bps = 1250
pumpswap_fee_coin_creator_share_bps = 750
pumpswap_meteora_class_a_min_profit_usdc = 0.08
pumpswap_meteora_class_b_min_profit_usdc = 0.03
pumpswap_meteora_class_a_min_confidence = 0.72
pumpswap_meteora_class_b_min_confidence = 0.45
pumpswap_meteora_min_hit_rate = 0.25
pumpswap_meteora_min_hit_rate_samples = 1000000

# 交易金额配置 (USDC)
# 寻路阶段先用小额确认是不是滑点把利润吃掉；看到稳定 exact 正收益后再放大。
trade_sizes = [1.0, 2.0, 3.0, 5.0, 8.0]

# program-pair 粗筛专用，单位 SOL。你现在只套 WSOL，这里才是当前
# PumpSwap/Meteora/Raydium 两程序路径的粗筛金额。
program_pair_trade_sizes_sol = [0.05, 0.1, 0.25, 0.5]
program_pair_best_size_search_samples = 4
program_pair_max_send_candidates_per_scan = 0
program_pair_send_min_gross_profit_pct = 0.0

# 每轮 exact direct 扫描最多处理多少个 token。
# 放开 PumpSwap/Meteora/Raydium 路径后，一轮允许多扫几个 routeable token。
max_direct_tokens_per_scan = 0

# 同一个 token 最多保留多少个 Meteora 池进入 direct scan。
max_meteora_pools_per_token_for_direct_scan = 2

